<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance | Attendance Management System</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/attendance.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- ==========================
            SIDEBAR
    =========================== -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-school"></i>

            <h2>AMS</h2>

        </div>

        <div class="standard-box">

            <h4>Current Standard</h4>

            <h3 id="currentStandard">

                Standard 1

            </h3>

            <a href="select-standard.html">

                <i class="fa-solid fa-repeat"></i>

                Change Standard

            </a>

        </div>

        <ul>

            <li>

                <a href="dashboard.html">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="students.html">

                    <i class="fa-solid fa-users"></i>

                    Students

                </a>

            </li>

            <li class="active">

                <a href="attendance.html">

                    <i class="fa-solid fa-calendar-check"></i>

                    Attendance

                </a>

            </li>

            <li>

                <a href="reports.html">

                    <i class="fa-solid fa-chart-column"></i>

                    Reports

                </a>

            </li>

            <li>

                <a href="index.html">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>

            </li>

        </ul>

    </aside>

    <!-- ==========================
            MAIN
    =========================== -->

    <main class="main">

                <!-- ==========================
                TOPBAR
        =========================== -->

        <div class="topbar">

            <div>

                <h1>Attendance Management</h1>

                <p id="currentClassText">

                    Standard 1

                </p>

            </div>

            <button class="save-btn" id="saveAttendance">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Attendance

            </button>

        </div>

        <!-- ==========================
                DATE SECTION
        =========================== -->

        <div class="attendance-info">

            <div class="date-box">

                <label for="attendanceDate">

                    <i class="fa-solid fa-calendar-days"></i>

                    Attendance Date

                </label>

                <input
                    type="date"
                    id="attendanceDate"
                >

            </div>

        </div>

        <!-- ==========================
                ATTENDANCE TABLE
        =========================== -->

        <div class="table-section">

            <table>

                <thead>

                    <tr>
                         <th>Photo</th>
                         
                        <th>Roll No</th>

                        <th>Student Name</th>

                        <th>Standard</th>

                        <th>Present</th>

                        <th>Absent</th>

                    </tr>

                </thead>

                <tbody id="attendanceTable">

                                        <!-- JavaScript Data -->

                </tbody>

            </table>

        </div>

        <!-- ==========================
                FOOTER
        =========================== -->

        <footer class="footer">

            <p>

                © 2026 Attendance Management System |
                Developed by Kaushik

            </p>

        </footer>

    </main>

</div>

<!-- ==========================
        JAVASCRIPT
=========================== -->

<script src="js/attendance.js"></script>

</body>
</html>
