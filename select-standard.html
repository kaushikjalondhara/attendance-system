<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Select Standard | Attendance Management System</title>

    <link rel="stylesheet" href="css/select-standard.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="selection-card">

        <div class="logo">

            <i class="fa-solid fa-school"></i>

        </div>

        <h1>Attendance Management System</h1>

        <p>Select Your Standard</p>

        <form id="classForm">

            <div class="input-group">

                <label>Select Standard</label>

                <select id="standard" required>

                    <option value="">-- Select Standard --</option>

                    <option value="1">Standard 1</option>
                    <option value="2">Standard 2</option>
                    <option value="3">Standard 3</option>
                    <option value="4">Standard 4</option>
                    <option value="5">Standard 5</option>
                    <option value="6">Standard 6</option>
                    <option value="7">Standard 7</option>
                    <option value="8">Standard 8</option>
                    <option value="9">Standard 9</option>
                    <option value="10">Standard 10</option>
                    <option value="11">Standard 11</option>
                    <option value="12">Standard 12</option>

                </select>

            </div>

            <button type="submit">

                <i class="fa-solid fa-arrow-right"></i>

                Continue

            </button>

        </form>

    </div>

</div>

<script src="js/select-standard.js"></script>

</body>
</html>
